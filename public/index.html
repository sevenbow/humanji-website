<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HumanJi Research Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <header class="bg-gradient-to-r from-blue-600 to-purple-700 text-white">
        <div class="container mx-auto px-6 py-16 text-center">
            <h1 class="text-5xl font-bold mb-6">HumanJi Research Lab</h1>
            <p class="text-xl mb-8 max-w-4xl mx-auto opacity-90">
                Studying the squeeze between rising AI capability and shrinking human oversight windows
            </p>
            <a href="https://github.com/sevenbow" class="bg-white text-blue-600 px-8 py-3 rounded-lg font-semibold hover:bg-gray-100 transition inline-block">
                <i class="fab fa-github mr-2"></i>View All Research
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="grid md:grid-cols-4 gap-6 mb-16">
            <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                <div class="text-4xl font-bold text-blue-600 mb-2">10</div>
                <div class="text-gray-600">Projects Completed</div>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                <div class="text-4xl font-bold text-green-600 mb-2">2</div>
                <div class="text-gray-600">Papers Ready</div>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                <div class="text-4xl font-bold text-purple-600 mb-2">1,200+</div>
                <div class="text-gray-600">Lines of Code</div>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                <div class="text-4xl font-bold text-red-600 mb-2">25+</div>
                <div class="text-gray-600">Novel Algorithms</div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8 text-center">
        <p>HumanJi Research Lab &copy; 2026 — humanji.in</p>
    </footer>
</body>
</html>
